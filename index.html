<!DOCTYPE html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1'><title>Artonus Onboarding</title><link rel='icon' type='image/png' href='https://static.wixstatic.com/media/1193d9_5794966292134434911d79c3d32d08a8~mv2.png/v1/fill/w_192,h_192,lg_1,usm_0.66_1.00_0.01/1193d9_5794966292134434911d79c3d32d08a8~mv2.png'><style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap');
:root{--ivory:#FBF7F0;--panel:#F3ECE0;--panel2:#f4efe4;--ink:#43301f;--ink2:#41342a;--brown:#5E4636;--gold:#B68A3E;--gold2:#9C7430;--line:#e6dcc9;--mut:#6f5c4b}
*{box-sizing:border-box}html,body{margin:0}
:root{--appw:min(100vw,480px)}
@media(min-width:920px){:root{--appw:900px}}
body{background:#e7ddc9;font-family:"Lato","Avenir Next","Helvetica Neue",system-ui,Arial,sans-serif;color:var(--ink2);-webkit-font-smoothing:antialiased}
html.dopen,html.dopen body{overflow:hidden}
.app{max-width:var(--appw);margin:0 auto;min-height:100vh;background:var(--ivory);position:relative;overflow:hidden;box-shadow:0 0 50px rgba(58,35,24,.16)}
header.hd{padding:22px 20px 14px;text-align:center;border-bottom:1px solid var(--line);background:linear-gradient(#fffaf1,var(--ivory))}
.brand-logo{height:52px;width:auto;max-width:74%;object-fit:contain;display:block;margin:2px auto 9px}
.h-title{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:25px;color:var(--ink);margin:0;letter-spacing:.4px}
.rule{width:46px;height:2px;background:var(--gold);margin:11px auto 0}
.roleswitch{position:absolute;left:14px;top:16px;border:none;background:none;color:var(--gold);font-family:"Lato",sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:4px}
/* app-switcher pill — matches the Membership/Referral apps' pill */
.appswitch{display:flex;justify-content:center;padding:14px 12px 2px}
.appswitch[hidden]{display:none}  /* display:flex otherwise beats the hidden attr → empty bar on phones */
.swpill{display:inline-flex;align-items:center;gap:2px;padding:3px;background:var(--panel);border:1px solid var(--line);border-radius:999px;box-shadow:0 1px 5px rgba(58,35,24,.14)}
.swpill a,.swpill span{font:800 11px/1 "Lato",system-ui,sans-serif;letter-spacing:.4px;text-transform:uppercase;color:var(--brown);text-decoration:none;padding:7px 13px;border-radius:999px;white-space:nowrap;transition:.15s}
.swpill a:hover{background:#fff;color:var(--ink)}
.swpill .on{background:linear-gradient(135deg,var(--brown),#7a5c43);color:var(--ivory)}
.rolepick{padding:20px 16px 30px}
.rolepick .pintro{text-align:center;color:var(--mut);font-size:13px;margin:4px 0 18px}
.rolecard{display:flex;align-items:center;gap:14px;padding:18px 16px;border:1px solid var(--line);border-radius:14px;background:#fff;margin:11px 0;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .05s}
.rolecard:hover{border-color:var(--gold);box-shadow:0 3px 14px rgba(58,35,24,.10)}
.rolecard:active{transform:scale(.99)}
.rolecard.soon{opacity:.55;cursor:default;background:#faf6ee}
.rolecard.soon:hover{border-color:var(--line);box-shadow:none}
.ricon{flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:17px;letter-spacing:.5px;color:var(--brown)}
.rtt{font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:20px;color:var(--ink);line-height:1.1}
.rts{color:var(--mut);font-size:12.5px;margin-top:3px}
.rcount{margin-left:auto;color:var(--gold);font-size:20px;font-weight:300}
.rbadge{margin-left:auto;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);font-weight:700;border:1px solid var(--line);border-radius:20px;padding:4px 9px}
.rlock{margin-left:auto;font-size:16px;opacity:.6}
.searchwrap{position:sticky;top:0;z-index:5;background:var(--ivory);padding:12px 15px;border-bottom:1px solid var(--line)}
.search{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:11px;font-size:15px;color:var(--ink);background:#fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="%23B68A3E" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>') no-repeat 13px center}
.search::placeholder{color:#b7a88f}
.search:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,137,92,.18)}
.list{padding:8px 14px 34px}
.group{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin:18px 6px 4px}
.tile{display:flex;align-items:center;gap:12px;padding:13px 12px;border:1px solid var(--line);border-radius:13px;background:#fff;margin:8px 0;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .05s}
.tile:hover{border-color:var(--gold);box-shadow:0 3px 12px rgba(58,35,24,.09)}
.tile:active{transform:scale(.99)}
.badge{flex:0 0 auto;width:35px;height:35px;border-radius:50%;background:var(--panel);color:var(--brown);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;border:1px solid var(--line)}
.txt{min-width:0}.tt{font-weight:700;color:var(--ink);font-size:15px;line-height:1.2}
.ts{color:var(--mut);font-size:12.5px;margin-top:2px}
.chev{margin-left:auto;color:var(--gold);font-size:20px;font-weight:300}
.snip{font-size:12.5px;color:var(--mut);padding:0 12px 11px 58px;line-height:1.5;margin-top:-4px}
mark{background:#f2dd9f;color:var(--ink);padding:0 2px;border-radius:2px}
.empty{text-align:center;color:var(--mut);padding:46px 20px;font-style:italic}
.tile.owner{border-style:dashed;border-color:#c9b48a;background:#fbf6ea}
.tile.owner .badge{background:#efe0c2;font-size:15px}
.tile.sit .badge{background:#e7efe0;color:#5a6f4a;font-family:"Cormorant Garamond",Georgia,serif;font-size:24px;font-weight:600;padding-top:9px}
.bmono{width:26px;height:auto;display:block;opacity:.85}
/* code gate */
.gate{padding:34px 22px;text-align:center}
.gate .gi{width:54px;height:54px;border-radius:50%;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;margin:0 auto;font-family:"Cormorant Garamond",Georgia,serif;font-weight:600;font-size:19px;letter-spacing:.5px;color:var(--brown)}
.gate h3{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:22px;color:var(--ink);margin:10px 0 4px}
.gate p{color:var(--mut);font-size:13px;margin:0 0 18px}
.gate input{width:170px;text-align:center;letter-spacing:6px;font-size:20px;padding:11px;border:1px solid var(--line);border-radius:10px;color:var(--ink)}
.gate input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,137,92,.18)}
.gate .err{color:#b4472f;font-size:12.5px;height:16px;margin-top:8px}
.btn{font-family:"Lato",sans-serif;font-weight:700;font-size:14px;letter-spacing:.4px;color:var(--ivory);background:var(--brown);border:none;padding:12px 26px;border-radius:11px;cursor:pointer;margin-top:16px}
.btn:disabled{opacity:.5;cursor:default}
.btn.ghost{background:none;color:var(--gold2);border:1px solid var(--line)}
/* situations */
.addsit{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border:1px dashed #c9b48a;border-radius:12px;background:#fbf7ee;color:var(--gold2);font-weight:700;font-size:13.5px;cursor:pointer;margin:8px 0}
.addsit:hover{border-color:var(--gold);color:var(--brown)}
.sitform{border:1px solid var(--line);border-radius:13px;background:#fff;padding:15px;margin:8px 0}
.sitform label{display:block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin:11px 0 4px}
.sitform input,.sitform textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;color:var(--ink)}
.sitform textarea{min-height:64px;resize:vertical}
.sitform input:focus,.sitform textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(168,137,92,.15)}
.sitrow{display:flex;gap:9px;margin-top:14px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--brown);color:var(--ivory);padding:11px 18px;border-radius:22px;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(58,35,24,.3);z-index:50;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
/* detail */
/* fixed overlay = exactly viewport height (no phantom scroll from the list behind it) */
.detail{position:fixed;top:0;bottom:0;left:50%;width:var(--appw);margin-left:calc(var(--appw) / -2);z-index:20;background:var(--ivory);box-shadow:0 0 50px rgba(58,35,24,.16);transform:translateX(100vw);transition:transform .24s ease;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail.open{transform:none}
.dbar{position:sticky;top:0;background:rgba(251,247,240,.97);backdrop-filter:blur(7px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:9px;padding:12px 14px;z-index:2}
.back{border:none;background:none;color:var(--gold);font-size:15px;font-weight:700;cursor:pointer;padding:2px 4px}
.dt{font-weight:700;color:var(--ink);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{padding:16px 18px 70px;font-size:14.5px;line-height:1.62;color:var(--ink2)}
.content h1,.content h2{font-weight:400;font-size:18px;color:var(--brown);margin:22px 0 8px;padding-top:4px}
.content h3{font-weight:700;font-size:13.5px;color:var(--brown);margin:18px 0 5px}
.content h4{font-weight:700;font-size:12.5px;color:var(--brown);margin:14px 0 4px}
.content p{margin:.55em 0}
.content strong{color:var(--ink);font-weight:700}.content em{color:var(--mut)}
.content ul,.content ol{margin:.4em 0 .8em 1.35em;padding:0}
.content li{margin:.34em 0;padding-left:3px}
.content ol>li::marker{color:var(--gold);font-weight:700}.content ul>li::marker{color:var(--gold)}
.content blockquote{border-left:3px solid var(--gold);margin:.8em 0;padding:7px 13px;background:var(--panel);border-radius:0 7px 7px 0;color:var(--mut)}
.content blockquote p{margin:.2em 0}
.content code{background:#efe8da;border-radius:4px;padding:1px 5px;font-size:12.5px;color:#5b4636}
a.xref{text-decoration:none}a.xref code{background:#efe0c2;color:#8a6524;cursor:pointer;border:1px solid #e3d0a8}
.tw{overflow-x:auto;margin:13px 0;border-radius:7px}
.content table{border-collapse:collapse;width:100%;font-size:12.3px;min-width:300px}
.content th{background:var(--brown);color:var(--ivory);text-align:left;padding:7px 9px;font-weight:700}
.content td{border:1px solid var(--line);padding:6px 9px}
.content tr:nth-child(even) td{background:var(--panel2)}
.content hr{border:none;border-top:1px solid var(--line);margin:20px 0}
.callout{border-left:3px solid var(--gold);background:var(--panel);padding:11px 15px;margin:13px 0;border-radius:0 7px 7px 0}
.callout-warning{border-left-color:#c08a3e;background:#f7eddd}.callout-note{border-left-color:#9a8a6a}
.callout-title{font-weight:700;color:var(--ink);margin-bottom:2px}
/* walkthrough pictures (lazy-loaded) */
.imgph{display:block;text-align:center;background:var(--panel);border:1px dashed var(--line);border-radius:9px;color:var(--mut);font-size:12px;font-style:italic;padding:26px 10px;margin:13px auto;max-width:420px}
img.sop-img{display:block;margin:13px auto;border:1px solid var(--line);border-radius:9px;box-shadow:0 2px 9px rgba(58,35,24,.10);height:auto}
/* daily checklists */
.content li:has(>input[type="checkbox"]){list-style:none;margin-left:-1.1em;padding:7px 9px;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:7px}
.content input[type="checkbox"]{width:19px;height:19px;accent-color:var(--gold);margin-right:9px;vertical-align:-4px;cursor:pointer}
.content li:has(>input[type="checkbox"]:checked){background:var(--panel);opacity:.62}
.content li:has(>input[type="checkbox"]:checked) strong{text-decoration:line-through}
footer.ft{text-align:center;color:var(--gold2);font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;padding:16px 0 24px}
.ownerbtn{font-family:"Lato",system-ui,sans-serif;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--gold2);background:#fff;border:1px solid var(--line);padding:8px 15px;border-radius:20px;cursor:pointer}
.ownerbtn.on{background:var(--brown);color:var(--ivory);border-color:var(--brown)}
.fnote{margin-top:11px}
.loading{text-align:center;color:var(--mut);padding:60px 20px;font-style:italic}
/* workflow map */
.flowtile{border-color:#e2c98f!important;background:linear-gradient(#fff9ec,#fff)}
.flowtile .badge{background:#fff;border-color:#e2c98f}
.flow{padding:2px 0 24px}
.fintro{color:var(--mut);font-size:12.5px;font-style:italic;margin:2px auto 18px;text-align:center;max-width:320px}
.fnode{display:flex;align-items:center;gap:10px;width:100%;max-width:330px;margin:0 auto;padding:12px 14px;background:#fff;border:1px solid var(--line);border-radius:13px;text-decoration:none;box-shadow:0 1px 4px rgba(58,35,24,.08);transition:.15s;cursor:pointer}
.fnode:hover{border-color:var(--gold);box-shadow:0 3px 12px rgba(58,35,24,.13)}
.fnode:active{transform:scale(.99)}
.fbadge{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:var(--brown);color:var(--ivory);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.flab{font-weight:700;color:var(--ink);font-size:14px;line-height:1.2}
.flab em{display:block;font-style:normal;font-weight:400;color:var(--mut);font-size:11.5px;margin-top:1px}
.fchev{margin-left:auto;color:var(--gold);font-size:18px;font-weight:300}
.fnode.fend{background:linear-gradient(135deg,var(--brown),#7a5c43);border-color:transparent}
.fnode.fend .flab{color:var(--ivory)}
.fnode.fend .fbadge{background:rgba(255,255,255,.22);color:var(--ivory)}
.fnode.fend .flab em{color:rgba(255,247,235,.72)}
.fconn{width:2px;min-height:22px;background:var(--line);margin:5px auto;position:relative}
.fconn span{position:absolute;left:11px;top:50%;transform:translateY(-50%);white-space:nowrap;font-size:10px;color:var(--gold2);font-weight:700;letter-spacing:.3px}
.fbr{max-width:330px;margin:6px auto;padding-left:24px;border-left:2px dashed #dcc9a2}
.fbrow{display:flex;align-items:center;gap:8px;margin:8px 0}
.fwhen{flex:0 0 68px;font-size:9.5px;color:var(--gold2);font-weight:700;text-transform:uppercase;letter-spacing:.3px;text-align:right;line-height:1.25}
.fnode.fbranch{max-width:none;flex:1;padding:9px 12px;background:var(--panel);box-shadow:none}
.fnode.fbranch .fbadge{width:24px;height:24px;font-size:11px;background:var(--gold)}
.fnode.fbranch .flab{font-size:12.5px}
.fany{max-width:330px;margin:24px auto 0;text-align:center;border-top:1px solid var(--line);padding-top:16px}
.fanyt{font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin-bottom:9px}
.fchips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.fchip{font-size:12px;font-weight:700;color:var(--brown);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:7px 13px;text-decoration:none;cursor:pointer}
.fchip:hover{background:#fff;border-color:var(--gold)}
/* the client loop — a closed, repeating cycle */
.cycle{max-width:346px;margin:0 auto;background:linear-gradient(#fffdf6,#fff7e6);border:1.5px solid #ecd9a8;border-radius:18px;padding:12px 12px 16px;box-shadow:0 2px 12px rgba(58,35,24,.07)}
.cyclehead{text-align:center;font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin:2px 0 13px}
.cyclebody{position:relative;padding-left:30px}
.returnrail{position:absolute;left:0;top:22px;bottom:22px;width:19px;border:2px solid var(--gold);border-right:none;border-radius:13px 0 0 13px;pointer-events:none}
.returnrail::after{content:'';position:absolute;top:-2px;right:-6px;width:0;height:0;border:6px solid transparent;border-left-color:var(--gold)}
.returnrail span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:8px;font-weight:700;letter-spacing:.2px;color:var(--gold2);text-transform:uppercase;text-align:center;line-height:1.15;background:linear-gradient(#fffbf2,#fff6e2);padding:5px 0}
.fnode.floop{border-color:#e7d3a4}
.fmid{max-width:280px;margin:1px auto;text-align:center;font-size:10.5px;font-style:italic;font-weight:600;color:var(--gold2)}
.fconn.short{min-height:11px}
.frule{max-width:346px;margin:16px auto 0;text-align:center;font-size:12px;font-weight:700;letter-spacing:.2px;color:var(--brown);background:var(--panel);border:1px dashed #d8c8a6;border-radius:11px;padding:10px 12px}
/* care phase — "while they're in the chair" (informational, not a card) */
.fphase{max-width:330px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:11px;padding:10px 14px}
.fphtitle{font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--gold2);margin-bottom:6px}
.fphlist{margin:0;padding:0 0 0 14px;list-style:none}
.fphlist li{position:relative;font-size:12.5px;color:var(--ink);line-height:1.45;margin:3px 0}
.fphlist li::before{content:'·';position:absolute;left:-12px;color:var(--gold);font-weight:700;font-size:15px;top:-1px}
/* track 2 — between clients (slow vs. slammed + priority ladder) */
.fband{max-width:346px;margin:20px auto 0;border-top:1px solid var(--line);padding-top:17px}
.fbandhead{text-align:center;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--brown);font-weight:700}
.fbandintro{text-align:center;font-size:11.5px;font-style:italic;color:var(--mut);margin:5px auto 13px;max-width:290px}
.fmode{display:block;max-width:330px;margin:10px auto;border-radius:12px;padding:11px 14px;text-decoration:none;border:1px solid var(--line)}
.fmhead{font-size:12.5px;font-weight:700;margin-bottom:6px;display:flex;align-items:center}
.fmode .fphlist,.fmode ul{margin:0;padding:0 0 0 14px;list-style:none}
.fmode li{position:relative;font-size:12.5px;line-height:1.45;color:var(--ink);margin:3px 0}
.fmode li::before{content:'·';position:absolute;left:-12px;font-weight:700;font-size:15px;top:-1px}
.fmode.busy{background:linear-gradient(#fff8f3,#fff);border-color:#e8c9b4}
.fmode.busy .fmhead{color:#9a4a24}
.fmode.busy li::before{color:#c0703f}
.fmode.slow{background:linear-gradient(#fffdf6,#fff8ea);border-color:#ecd9a8;cursor:pointer;transition:.15s}
.fmode.slow .fmhead{color:var(--brown)}
.fmode.slow li::before{color:var(--gold)}
.fmode.slow .fchev{margin-left:auto;color:var(--gold);font-size:17px;font-weight:300}
.fmode.slow:hover{border-color:var(--gold);box-shadow:0 3px 12px rgba(58,35,24,.11)}
.fpri{max-width:330px;margin:14px auto 0;text-align:center}
.fprihead{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold2);font-weight:700;margin-bottom:9px}
.fprichain{display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:6px}
.fpm{font-size:11px;font-weight:700;color:var(--brown);background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
.fparrow{color:var(--gold);font-weight:700}
/* branded loader — the mark, breathing */
.loader{display:flex;flex-direction:column;align-items:center;gap:13px;padding:64px 20px;color:var(--mut);font-size:13px;font-style:italic}
.loader img{width:64px;height:auto;animation:markpulse 1.4s ease-in-out infinite}
@keyframes markpulse{0%,100%{opacity:.3;transform:scale(.94)}50%{opacity:.95;transform:scale(1.05)}}
/* entrance animation — items rise in as they appear / scroll into view */
@media(prefers-reduced-motion:no-preference){
 .tile,.rolecard,.group,.addsit{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
 .tile.vis,.rolecard.vis,.group.vis,.addsit.vis{opacity:1;transform:translateY(0)}
}
/* photo thumbnails on the situation form */
.lblnote{font-weight:400;text-transform:none;letter-spacing:0;color:var(--mut)}
.photobtn{margin-top:2px;padding:10px 18px;font-size:13px}
.thumbs{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
.thumb{position:relative;display:inline-block}
.thumb img{width:86px;height:86px;object-fit:cover;border-radius:9px;border:1px solid var(--line)}
.thumbx{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;border:none;background:var(--brown);color:var(--ivory);font-size:11px;line-height:1;cursor:pointer}
/* desktop: use the width — two-column tiles, comfortable reading column */
@media(min-width:920px){
 .list{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;align-items:start;padding:8px 26px 40px}
 .group,.addsit,.empty,.sitform,.loader{grid-column:1/-1;justify-self:stretch}
 .rolepick{max-width:640px;margin:0 auto}
 .content{max-width:760px;margin:0 auto}
 .searchwrap{padding:14px 26px}
 .gate{max-width:520px;margin:0 auto}
}

<script>
/* hosted backend: cookieless cross-origin fetch to the Apps Script probe API.
   text/plain keeps it a "simple request" (no preflight); no credentials are
   ever attached, so Google's signed-in account routing can never interfere. */
var EXEC_URL='https://script.google.com/macros/s/AKfycbyN2tBewrx8FQejF5d17zcsji9TbntMOnu-bf4DE01TLTUEfSORgzh-Luk3HQjUFlPC/exec';
function callServer(method, payload){
  return fetch(EXEC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
                         body:JSON.stringify({probe:method,p:payload||{}})})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(j){if(j&&j.probeError)throw new Error(j.probeError);return j;});
}

/* ---------- markdown pipeline (runtime, from Sheet body_md) ---------- */
function preCallouts(md){
 const lines=md.split('\n'), out=[]; let i=0;
 while(i<lines.length){
  const m=lines[i].match(/^>\s*\[!(\w+)\]\s*(.*)$/);
  if(m){const typ=m[1].toLowerCase(); const title=m[2].trim(); const body=[]; i++;
   while(i<lines.length&&/^>/.test(lines[i])){body.push(lines[i].replace(/^>\s?/,'')); i++;}
   out.push('<div class="callout callout-'+typ+'">'+(title?'<div class="callout-title">'+esc(title)+'</div>':'')+marked.parse(body.join('\n'))+'</div>');
  } else {out.push(lines[i]); i++;}
 }
 return out.join('\n');
}
function sepTables(md){
 const lines=md.split('\n'), out=[];
 for(let i=0;i<lines.length;i++){
  const nxt=lines[i+1]||'';
  if(/^\s*\|.*\|\s*$/.test(lines[i])&&/^\s*\|[\s:|\-]+\|\s*$/.test(nxt)&&out.length&&out[out.length-1].trim()!=='')out.push('');
  out.push(lines[i]);
 }
 return out.join('\n');
}
function linkify(html){return html.replace(/<code>(\d{2})([^<]*)<\/code>/g,(m,n,r)=>BADGE2ID[n]?'<a class="xref" data-goto="'+BADGE2ID[n]+'"><code>'+n+r+'</code></a>':m);}
function renderMd(md){
 let html=marked.parse(sepTables(preCallouts(md||'')));
 html=html.replace(/<table>/g,'<div class="tw"><table>').replace(/<\/table>/g,'</table></div>');
 /* {{img:name|w}} -> lazy placeholder, filled by getImage after the card opens */
 html=html.replace(/\{\{img:([\w .\-]+)\|(\d+)\}\}/g,(m,n,w)=>'<span class="imgph" data-appimg="'+esc(n)+'" data-w="'+w+'">Loading picture…</span>');
 /* task lists: enable the checkboxes (marked emits them disabled) */
 html=html.replace(/(<input[^>]*type="checkbox"[^>]*?)\sdisabled=""([^>]*>)/g,'$1$2').replace(/(<input[^>]*type="checkbox"[^>]*?)\sdisabled([^>]*>)/g,'$1$2');
 /* external links open a NEW tab — never navigate the app away (base target=_top would) */
 html=html.replace(/<a href="(https?:\/\/[^"]+)"/g,'<a href="$1" target="_blank" rel="noopener"');
 return linkify(html);
}
function loadImages(root){

  const sit=ph.dataset.sitimg, name=sit||ph.dataset.appimg, w=ph.dataset.w||'680';
  const key=(sit?'sit:':'app:')+name;
  const place=src=>{const img=new Image();img.className='sop-img';img.style.maxWidth='min(100%,'+w+'px)';img.src=src;ph.replaceWith(img);};
  if(IMGCACHE.has(key)){place(IMGCACHE.get(key));return;}
  const call=sit?callServer('getSitImage',{id:name,role:role,code:curCode,pin:ownerPin})
               :callServer('getImage',{name:name,role:role,code:curCode,pin:ownerPin});

   if(r&&r.ok){IMGCACHE.set(key,r.src);place(r.src);}else ph.textContent='(picture unavailable)';
  }).catch(()=>{ph.textContent='(picture unavailable)';});
 });
}

function snippet(text,tk){let bi=-1;for(const t of tk){const i=text.toLowerCase().indexOf(t);if(i>=0&&(bi<0||i<bi))bi=i;}
 if(bi<0)return'';const s=Math.max(0,bi-42),e=Math.min(text.length,bi+80);
 let f=esc((s>0?'… ':'')+text.slice(s,e).trim()+(e<text.length?' …':''));return f.replace(marker(tk),'<mark>$1</mark>');}
function tileEl(c,tk){
 const t=document.createElement('div');t.className='tile'+(c.vis==='owner'?' owner':'')+(c.group==='situations'?' sit':'')+(c.special==='flow'?' flowtile':'');t.onclick=()=>openCard(c.id);
 const badge=(c.special==='flow'||c.num==='§')?'<img class="bmono" src="'+MARK+'" alt="">':esc(c.num);
 t.innerHTML='<div class="badge">'+badge+'</div><div class="txt"><div class="tt">'+esc(c.title)+'</div><div class="ts">'+esc(c.subtitle)+'</div></div><div class="chev">›</div>';
 if(tk&&tk.length){const sn=snippet(c.text,tk);if(sn){const w=document.createElement('div');w.appendChild(t);const d=document.createElement('div');d.className='snip';d.innerHTML=sn;w.appendChild(d);return w;}}
 return t;
}
function renderList(){
 const tk=toks(query),listEl=$('list');listEl.innerHTML='';
 const pool=cards.filter(canSee);
 if(!query.trim()){const add=document.createElement('div');add.className='addsit';add.innerHTML='+ Add a situation you handled';add.onclick=openSitForm;listEl.appendChild(add);}
 if(tk.length&&query.trim()){
  const hits=pool.filter(c=>{const hay=(c.title+' '+c.subtitle+' '+c.text).toLowerCase();return tk.every(t=>hay.includes(t));});
  if(!hits.length){listEl.innerHTML='<div class="empty">No matches for “'+esc(query.trim())+'”.</div>';return;}
  hits.forEach(c=>listEl.appendChild(tileEl(c,tk)));
 }else{
  GROUPS.forEach(([g,label])=>{const gi=pool.filter(c=>c.group===g);if(!gi.length)return;
   if(label){const h=document.createElement('div');h.className='group';h.textContent=label;listEl.appendChild(h);}
   gi.forEach(c=>listEl.appendChild(tileEl(c,null)));});
 }
 animateIn(listEl);
}
function highlight(el,tk){if(!tk||!tk.length)return;const nodes=[];const w=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);while(w.nextNode())nodes.push(w.currentNode);
 nodes.forEach(n=>{const v=n.nodeValue;if(!v.trim())return;const re=marker(tk);if(re.test(v)){const sp=document.createElement('span');sp.innerHTML=esc(v).replace(marker(tk),'<mark>$1</mark>');n.replaceWith(sp);}});}
function openCard(id,opts){opts=opts||{};const c=cards.find(x=>x.id===id);if(!c)return;
 const wasOpen=$('detail').classList.contains('open');
 if(!wasOpen)navStack=[];                                    /* fresh open from the list */
 else if(!opts.back&&curCardId&&curCardId!==id)navStack.push(curCardId); /* going deeper — remember where we were */
 curCardId=id;updateBack();
 $('detail').classList.add('open');$('detail').scrollTop=0;document.documentElement.classList.add('dopen');
 if(c.special==='flow'){$('dtitle').textContent=c.title;$('dcontent').innerHTML='<div class="flow">'+renderFlow()+'</div>';return;}
 $('dtitle').textContent=(/^\d{2}$/.test(c.num)?c.num+' · ':'')+c.title;$('dcontent').innerHTML=c.html;
 highlight($('dcontent'),toks(query));
 loadImages($('dcontent'));initTasks($('dcontent'),id);}
function updateBack(){const b=$('back');if(!b)return;
 const prev=navStack.length?cards.find(x=>x.id===navStack[navStack.length-1]):null;
 b.innerHTML='‹ '+(prev?(prev.special==='flow'?'Map':'Back'):'Back');}
function goBack(){
 if(navStack.length){openCard(navStack.pop(),{back:true});}
 else{$('detail').classList.remove('open');document.documentElement.classList.remove('dopen');navStack=[];}}

/* ---------- situations: submit (with optional photos) ---------- */
function compressImg(file){
 return new Promise(res=>{
  const fr=new FileReader();
  fr.onload=()=>{const im=new Image();
   im.onload=()=>{const s=Math.min(1,900/Math.max(im.width,im.height));
    const c=document.createElement('canvas');c.width=Math.round(im.width*s);c.height=Math.round(im.height*s);
    c.getContext('2d').drawImage(im,0,0,c.width,c.height);
    res(c.toDataURL('image/jpeg',.72));};
   im.onerror=()=>res(null);im.src=fr.result;};
  fr.onerror=()=>res(null);fr.readAsDataURL(file);
 });
}
let sitPhotos=[];
function renderThumbs(){
 const t=$('s_thumbs');if(!t)return;
 t.innerHTML=sitPhotos.map((d,i)=>'<span class="thumb"><img src="'+d+'"><button type="button" class="thumbx" data-i="'+i+'">✕</button></span>').join('');
 const pick=$('s_pick');if(pick)pick.style.display=sitPhotos.length>=2?'none':'';
}
function openSitForm(){
 const listEl=$('list');listEl.innerHTML='';sitPhotos=[];
 const f=document.createElement('div');f.className='sitform';
 f.innerHTML='<label>What was the situation?</label><input id="s_title" placeholder="e.g. Client disputed a package balance">'
  +'<label>What happened</label><textarea id="s_what"></textarea>'
  +'<label>How you resolved it</label><textarea id="s_res"></textarea>'
  +'<label>Your name</label><input id="s_name" placeholder="First name">'
  +'<label>Photos <span class="lblnote">(optional, up to 2 — a screenshot helps the next person)</span></label>'
  +'<input id="s_photos" type="file" accept="image/*" multiple hidden>'
  +'<div><button type="button" class="btn ghost photobtn" id="s_pick">+ Add photos</button></div>'
  +'<div id="s_thumbs" class="thumbs"></div>'
  +'<div class="sitrow"><button class="btn" id="s_send">Send for approval</button><button class="btn ghost" id="s_cancel">Cancel</button></div>'
  +'<div class="err" id="s_err"></div>';
 listEl.appendChild(f);
 $('s_cancel').onclick=renderList;
 $('s_pick').onclick=()=>$('s_photos').click();
 $('s_photos').addEventListener('change',async e=>{
  const files=[...(e.target.files||[])].slice(0,2-sitPhotos.length);
  for(const file of files){const d=await compressImg(file);if(d&&d.length<350000)sitPhotos.push(d);else toast('That photo could not be added');}
  e.target.value='';renderThumbs();
 });
 $('s_thumbs').addEventListener('click',e=>{const b=e.target.closest('.thumbx');if(b){sitPhotos.splice(Number(b.dataset.i),1);renderThumbs();}});
 $('s_send').onclick=()=>{
  const p={role:role,title:$('s_title').value.trim(),situation:$('s_what').value.trim(),resolution:$('s_res').value.trim(),author:$('s_name').value.trim(),photos:sitPhotos};
  if(!p.title||!p.situation||!p.resolution){$('s_err').textContent='Fill in the situation, what happened, and how you resolved it.';return;}
  $('s_send').disabled=true;$('s_send').textContent='Sending…';
  callServer('submitSituation',p).then(()=>{toast('Sent — an owner will review it');sitPhotos=[];renderList();})
   .catch(e=>{$('s_err').textContent='Could not send. '+esc(e&&e.message||'');$('s_send').disabled=false;$('s_send').textContent='Send for approval';});
 };
 $('s_title').focus();
}
let toastT;function toast(msg){let el=$('toast');if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.body.appendChild(el);}el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ---------- owner view (server-gated) ---------- */
function ownerFlow(){
 if(owner){owner=false;$('ownerToggle').classList.remove('on');$('ownerToggle').textContent='Owner view';renderList();return;}
 const pin=prompt('Owner PIN');if(!pin)return;
 callServer('ownerUnlock',{role:role,pin:pin.trim()}).then(res=>{
  if(!res||!res.ok){toast('Wrong PIN');return;}
  ownerPin=pin.trim();
  (res.rows||[]).forEach(r=>{if(!cards.find(c=>c.id===r.id)){const html=renderMd(r.body_md);cards.push({id:r.id,role:r.role,num:normBadge(r.badge),title:r.title,subtitle:r.subtitle||'',group:r.group,vis:'owner',html,text:plain(html)});}});
  owner=true;$('ownerToggle').classList.add('on');$('ownerToggle').textContent='Owner view — on';renderList();
 });
}

/* ---------- wire + boot ---------- */
function boot(){
 renderAppSwitch();
 $('back').onclick=goBack;
 $('roleSwitch').addEventListener('click',e=>{if($('roleSwitch').dataset.mode!=='t'){e.preventDefault();toRoles();}});
 $('dcontent').addEventListener('click',e=>{
  const x=e.target.closest('[data-goto]');if(x){e.preventDefault();openCard(x.dataset.goto);return;}
  const a=e.target.closest('a[href]');if(!a)return;
  const href=a.getAttribute('href')||'';
  if(a.target==='_blank')return;                       /* external: let it open a new tab */
  if(href.indexOf('#')>=0||/\.md(\?|$)/i.test(href)){  /* handbook-internal link */
   e.preventDefault();
   const frag=href.indexOf('#')>=0?decodeURIComponent(href.slice(href.indexOf('#')+1)):'';
   const id=frag?ANCH[normKey(frag)]:null;
   if(id)openCard(id);else toast('That section isn’t in this view');
  }
 });
 $('dcontent').addEventListener('change',e=>{if(e.target.matches('input[type="checkbox"]')&&curCardId)saveTasks($('dcontent'),curCardId);});
 $('q').addEventListener('input',()=>{query=$('q').value;renderList();});
 $('ownerToggle').addEventListener('click',ownerFlow);
 $('rolepick').hidden=false;$('rolepick').innerHTML=loaderHtml('Waking up…');
 callServer('getRoles',{}).then(rs=>{ROLES=rs||[];renderRoles();setSwitch('terminal');renderAppSwitch();})
  .catch(e=>{$('rolepick').innerHTML='<div class="empty">Couldn’t load roles. '+esc(e&&e.message||'')+'</div>';});
}
/* Apps Script HtmlService evaluates this AFTER the iframe doc has loaded —
   DOMContentLoaded may have already fired, so guard on readyState. */
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);else boot();
</script>
